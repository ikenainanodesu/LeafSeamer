name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run build
      - run: node scripts/validate-status-report.mjs

  standalone-bundles:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        bundle:
          - seamer
          - schedule-manager
          - logger-system
          - backup-system
          - obs-control
          - atem-control
          - vb-matrix-control
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=bundles/${{ matrix.bundle }}

  postgresql-live:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: leafseamer
          POSTGRES_PASSWORD: leafseamer-test
          POSTGRES_DB: leafseamer
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U leafseamer -d leafseamer"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
        env:
          LEAFSEAMER_TEST_POSTGRES_URL: postgresql://leafseamer:leafseamer-test@127.0.0.1:5432/leafseamer
